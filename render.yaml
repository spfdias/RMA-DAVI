services:
  - type: web
    name: rma-davi
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rma-davi-db
          property: connectionString
      - key: DB_PATH
        value: /app/server/data
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://rma-davi.onrender.com
      - key: NODE_ENV
        value: production
    disk:
      name: rma-davi-data
      mountPath: /app/server/data
      sizeGB: 1

databases:
  - name: rma-davi-db
    region: ohio
    plan: free
    ipAllowList: []
